name: Kernel Compilation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up build environment
        run: |
          sudo apt update -y
          sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
            libncurses5-dev git device-tree-compiler ccache gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Set environment variable
        run: |
          echo "BUILD_KERNEL_VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KBUILD_BUILD_USER="A-Australian"
          export KBUILD_BUILD_HOST="github-actions"

          # Use your existing script
          bash build_kernel.sh

          # Create the output structure your release expects
          mkdir -p build
          cp arch/arm64/boot/Image build/
          cd build
          tar -cvf "KernelSU-Next-SM-A047F-${{ github.event.inputs.tag }}.tar" Image
          echo "Build finished → KernelSU-Next-SM-A047F-${{ github.event.inputs.tag }}.tar"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Next-SM-A047F-${{ github.event.inputs.tag }}
          path: build/*.tar

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          name: "A047F-Next-${{ github.event.inputs.tag }}"
          draft: false
          prerelease: false
          token: ${{ secrets.TOKEN }}
          artifacts: "build/*.tar"
          body: "Commit SHA: ${{ github.sha }}"
